<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>300 Reasoning - Manish Study Hub</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#0f172a;color:#e2e8f0;padding:10px}
.container{max-width:800px;margin:0 auto}
.header{background:#1e293b;padding:15px;border-radius:12px;margin-bottom:15px;text-align:center;border:2px solid #334155}
.header h1{color:#22d3ee;font-size:24px;margin-bottom:8px}
.header p{color:#94a3b8;font-size:14px}
.btn{background:#22d3ee;color:#0f172a;border:none;padding:12px 20px;border-radius:8px;font-weight:700;font-size:16px;margin:5px;cursor:pointer;width:100%}
.btn:hover{background:#06b6d4}
.btn-secondary{background:#334155;color:#e2e8f0}
.card{background:#1e293b;padding:20px;border-radius:12px;border:2px solid #334155;margin-bottom:15px}
#quiz{display:none}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;flex-wrap:wrap;gap:10px}
#timer{display:none;background:#dc2626;color:#fff;padding:8px 15px;border-radius:8px;font-weight:700}
#score{background:#059669;color:#fff;padding:8px 15px;border-radius:8px;font-weight:700}
.q-header{font-size:18px;color:#22d3ee;margin-bottom:15px;font-weight:700}
.question{font-size:18px;line-height:1.6;margin-bottom:20px}
.option{background:#0f172a;padding:15px;border-radius:8px;margin:10px 0;border:2px solid #334155;cursor:pointer}
.option:hover{border-color:#22d3ee}
.option.correct{background:#065f46;border-color:#10b981}
.option.wrong{background:#7f1d1d;border-color:#ef4444}
#explain{display:none;background:#0f172a;padding:15px;border-radius:8px;margin-top:15px;border-left:4px solid #22d3ee}
.nav-btns{display:flex;gap:10px;margin-top:15px}
.nav-btns button{flex:1}
.palette{display:flex;flex-wrap:wrap;gap:5px;margin:15px 0;max-height:200px;overflow-y:auto}
.q-num{width:40px;height:40px;border-radius:6px;border:2px solid #334155;background:#0f172a;color:#94a3b8;font-size:14px;cursor:pointer}
.q-num.q-current{border-color:#22d3ee;background:#22d3ee;color:#0f172a;font-weight:700}
.q-num.q-attempted{background:#065f46;border-color:#10b981;color:#fff}
#result{display:none;text-align:center}
#finalScore{font-size:32px;color:#22d3ee;margin:20px 0;font-weight:700}
</style>
</head>
<body>
<div class="container">
  <div id="home">
    <div class="header">
      <h1>🧠 300 Reasoning Questions</h1>
      <p>Manish Study Hub - SSC/RRB/Patwari Level</p>
    </div>
    <div class="card">
      <button class="btn" onclick="startQuiz('practice')">📚 Practice Mode<br><small style="font-weight:400">Answer + Explanation तुरंत</small></button>
      <button class="btn btn-secondary" onclick="startQuiz('exam')">⏱️ Exam Mode<br><small style="font-weight:400">90 Min Timer + Final Result</small></button>
    </div>
  </div>

  <div id="quiz">
    <div class="top-bar">
      <div id="score">Score: 0/300</div>
      <div id="timer">Time: 90:00</div>
    </div>
    <div class="card">
      <div class="q-header" id="qNum">Q1/300</div>
      <div class="question" id="question"></div>
      <div id="options"></div>
      <div id="explain"></div>
      <div class="nav-btns">
        <button class="btn btn-secondary" onclick="prevQ()">⬅️ Previous</button>
        <button class="btn" onclick="nextQ()">Next ➡️</button>
      </div>
      <button class="btn" style="background:#dc2626;margin-top:10px" onclick="submitTest()">Submit Test</button>
    </div>
    <div class="card">
      <div style="font-weight:700;margin-bottom:10px">Question Palette:</div>
      <div class="palette" id="palette"></div>
    </div>
  </div>

  <div id="result" class="card">
    <h2 style="color:#22d3ee">🎉 Test Complete!</h2>
    <div id="finalScore"></div>
    <button class="btn" onclick="location.reload()">Restart</button>
  </div>
</div>
