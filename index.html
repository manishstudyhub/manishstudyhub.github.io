<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NCERT Master Quiz 1275 Q</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,Segoe UI,sans-serif}
:root{--bg:#0f172a;--card:#1e293b;--border:#334155;--text:#e2e8f0;--blue:#38bdf8;--green:#22c55e;--red:#ef4444;--yellow:#facc15}
body{background:var(--bg);color:var(--text);padding:12px}
.container{max-width:500px;margin:0 auto}
h1{text-align:center;color:var(--blue);font-size:22px;margin:8px 0}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
.btn{background:var(--blue);color:var(--bg);border:none;padding:12px;border-radius:8px;font-weight:600;cursor:pointer;width:100%;margin:6px 0;font-size:15px}
.btn-sec{background:var(--border);color:var(--text)}
.btn-sm{padding:8px 12px;width:auto;font-size:13px;margin:4px}
.sub-btn{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:12px 0}
.sub-btn.btn{margin:0;font-size:14px}
select{width:100%;padding:10px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);margin:8px 0}
.question{font-size:16px;margin-bottom:12px;line-height:1.5}
.option{background:var(--bg);border:2px solid var(--border);padding:12px;border-radius:8px;margin:8px 0;cursor:pointer;font-size:15px}
.option.selected{border-color:var(--blue);background:#1e3a5f}
.option.correct{border-color:var(--green);background:#14532d}
.option.wrong{border-color:var(--red);background:#7f1d1d}
.flex{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.timer{font-size:18px;font-weight:700;color:var(--yellow)}
.progress{height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin:12px 0}
.progress-bar{height:100%;background:var(--blue);transition:width 0.3s}
.palette{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin:12px 0}
.pal-btn{padding:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);border-radius:6px;cursor:pointer;font-size:12px}
.pal-btn.current{border-color:var(--blue);background:var(--blue);color:var(--bg)}
.pal-btn.ans{background:var(--green);border-color:var(--green)}
.pal-btn.review{background:var(--yellow);border-color:var(--yellow);color:var(--bg)}
.result-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:12px 0}
.result-box{background:var(--bg);padding:12px;border-radius:8px;text-align:center}
.result-box h3{font-size:24px;margin-bottom:4px}
.hidden{display:none}
.badge{display:inline-block;background:var(--border);padding:3px 10px;border-radius:20px;font-size:11px;margin:3px}
.explain{background:#0f172a;border-left:3px solid var(--blue);padding:10px;margin-top:10px;border-radius:4px;font-size:14px}
</style>
</head>
<body>
<div class="container">
    <h1>NCERT Master Quiz</h1>

    <div id="homeScreen" class="card">
        <p style="text-align:center;color:#94a3b8;font-size:13px;margin-bottom:12px">1275 Q | No Login | 100% Free</p>

        <div class="sub-btn">
            <button class="btn" onclick="selectSub('Reasoning')">Reasoning<br>325 Q</button>
            <button class="btn" onclick="selectSub('GK')">GK<br>450 Q</button>
            <button class="btn" onclick="selectSub('Physics')">Physics<br>200 Q</button>
            <button class="btn" onclick="selectSub('Chemistry')">Chemistry<br>200 Q</button>
            <button class="btn" onclick="selectSub('Biology')">Biology<br>200 Q</button>
            <button class="btn" onclick="selectSub('Math')">Math<br>200 Q</button>
            <button class="btn" onclick="selectSub('All')" style="grid-column:span 2">All Mix - 1275 Q</button>
        </div>

        <select id="mode">
            <option value="practice">Practice Mode - No Timer</option>
            <option value="exam">Exam Mode - 60 Min Timer</option>
        </select>

        <select id="qCount">
            <option value="10">10 Questions</option>
            <option value="25">25 Questions</option>
            <option value="50" selected>50 Questions</option>
            <option value="100">100 Questions</option>
        </select>

        <button class="btn" onclick="startQuiz()">Start Quiz 🚀</button>
    </div>

    <div id="quizScreen" class="hidden">
        <div class="flex">
            <span class="badge">Q <span id="qNum">1</span>/<span id="qTotal">50</span></span>
            <span class="timer" id="timer">No Timer</span>
        </div>
        <div class="progress"><div class="progress-bar" id="progressBar"></div></div>

        <div class="card">
            <div class="question" id="questionText"></div>
            <div id="options"></div>
            <div id="explainBox" class="explain hidden"></div>
        </div>

        <div class="flex">
            <button class="btn-sm btn-sec" onclick="prevQ()">← Prev</button>
            <button class="btn-sm btn-sec" onclick="markReview()">Mark Review</button>
            <button class="btn-sm btn-sec" onclick="nextQ()">Next →</button>
        </div>

        <div class="card">
            <p style="font-size:13px;margin-bottom:8px;color:#94a3b8">Question Palette:</p>
            <div class="palette" id="palette"></div>
        </div>

        <button class="btn" onclick="submitQuiz()">Submit Quiz</button>
    </div>

    <div id="resultScreen" class="hidden">
        <div class="card">
            <h2 style="text-align:center;margin-bottom:12px">Result 🎉</h2>
            <div class="result-grid">
                <div class="result-box"><h3 style="color:var(--blue)" id="score">0</h3><p>Score</p></div>
                <div class="result-box"><h3 style="color:var(--yellow)" id="percent">0%</h3><p>Percent</p></div>
                <div class="result-box"><h3 style="color:var(--green)" id="correct">0</h3><p>Correct</p></div>
                <div class="result-box"><h3 style="color:var(--red)" id="wrong">0</h3><p>Wrong</p></div>
            </div>
            <button class="btn" onclick="showReview()">See Answers + Explanation</button>
            <button class="btn btn-sec" onclick="location.reload()">New Quiz</button>
        </div>
        <div id="reviewBox" class="hidden"></div>
    </div>
</div>

<script>
// === QUESTION BANK START ===
const QB = [
{q:"अगला पद क्या है: 2,4,8,16,?",opt:["24","30","32","20"],ans:2,exp:"हर बार 2 से गुणा हो रहा है: 16×2=32",sub:"Reasoning"},
{q:"यदि CAT=3120 तो DOG=?",opt:["4157","4158","4185","4156"],ans:0,exp:"C=3,A=1,T=20 और D=4,O=15,G=7",sub:"Reasoning"},
// BHAI YAHAN 325 REASONING Q DALUNGA AGLE REPLY ME
// TU ABHI ISE TEST KAR LE - 2 Q SE
];

let currentQ=[],qIndex=0,answers=[],review=[],timer, timeLeft=0,examMode=false,selectedSub="All";

function selectSub(sub){selectedSub=sub;document.querySelectorAll('.sub-btn.btn').forEach(b=>b.style.opacity='0.6');event.target.style.opacity='1'}

function startQuiz(){
    let mode=document.getElementById('mode').value;
    let count=parseInt(document.getElementById('qCount').value);
    examMode=mode==="exam";

    let filtered=selectedSub==="All"?QB:QB.filter(q=>q.sub===selectedSub);
    currentQ=filtered.sort(()=>Math.random()-0.5).slice(0,Math.min(count,filtered.length));
    if(currentQ.length===0){alert("Is subject me Q add nahi hue. Part-2 ka wait karo");return;}

    qIndex=0;answers=Array(currentQ.length).fill(-1);review=Array(currentQ.length).fill(false);
    document.getElementById('homeScreen').classList.add('hidden');
    document.getElementById('quizScreen').classList.remove('hidden');
    document.getElementById('qTotal').textContent=currentQ.length;

    if(examMode){timeLeft=3600;startTimer();}else{document.getElementById('timer').textContent="No Timer"}
    makePalette();loadQ();
}

function startTimer(){
    timer=setInterval(()=>{
        timeLeft--;let m=Math.floor(timeLeft/60),s=timeLeft%60;
        document.getElementById('timer').textContent=`${m}:${s<10?'0':''}${s}`;
        if(timeLeft<=0){clearInterval(timer);submitQuiz();}
    },1000);
}

function makePalette(){
    let html='';currentQ.forEach((q,i)=>{
        html+=`<button class="pal-btn" id="pal${i}" onclick="jumpQ(${i})">${i+1}</button>`;
    });
    document.getElementById('palette').innerHTML=html;
}

function updatePalette(){
    currentQ.forEach((q,i)=>{
        let btn=document.getElementById(`pal${i}`);
        btn.className='pal-btn';
        if(i===qIndex)btn.classList.add('current');
        else if(review[i])btn.classList.add('review');
        else if(answers[i]!==-1)btn.classList.add('ans');
    });
}

function loadQ(){
    if(qIndex>=currentQ.length){submitQuiz();return;}
    let q=currentQ[qIndex];
    document.getElementById('qNum').textContent=qIndex+1;
    document.getElementById('questionText').textContent=`Q${qIndex+1}. ${q.q}`;
    document.getElementById('progressBar').style.width=((qIndex+1)/currentQ.length*100)+'%';

    let optHtml='';q.opt.forEach((opt,i)=>{
        let cls='option';if(answers[qIndex]===i)cls+=' selected';
        optHtml+=`<div class="${cls}" onclick="selectOpt(${i})">${String.fromCharCode(65+i)}. ${opt}</div>`;
    });
    document.getElementById('options').innerHTML=optHtml;
    document.getElementById('explainBox').classList.add('hidden');
    updatePalette();
}

function selectOpt(i){
    answers[qIndex]=i;loadQ();
    if(!examMode && currentQ[qIndex].exp){
        document.getElementById('explainBox').textContent="Explanation: "+currentQ[qIndex].exp;
        document.getElementById('explainBox').classList.remove('hidden');
    }
}

function nextQ(){if(qIndex<currentQ.length-1){qIndex++;loadQ();}}
function prevQ(){if(qIndex>0){qIndex--;loadQ();}}
function jumpQ(i){qIndex=i;loadQ();}
function markReview(){review[qIndex]=!review[qIndex];updatePalette();}

function submitQuiz(){
    clearInterval(timer);
    let correct=0,wrong=0,skip=0;
    currentQ.forEach((q,i)=>{
        if(answers[i]===-1)skip++;
        else if(answers[i]===q.ans)correct++;
        else wrong++;
    });
    let score=correct-wrong*0.25;
    let percent=(score/currentQ.length*100).toFixed(1);

    document.getElementById('quizScreen').classList.add('hidden');
    document.getElementById('resultScreen').classList.remove('hidden');
    document.getElementById('score').textContent=score.toFixed(2);
    document.getElementById('percent').textContent=percent+'%';
    document.getElementById('correct').textContent=correct;
    document.getElementById('wrong').textContent=wrong;
}

function showReview(){
    let html='<div class="card"><h3>Answer Review + Explanation</h3>';
    currentQ.forEach((q,i)=>{
        let userAns=answers[i];
        let status=userAns===q.ans?'correct':userAns===-1?'skip':'wrong';
        html+=`<div style="margin:12px 0;padding:10px;background:var(--bg);border-radius:8px;border-left:3px solid ${
            status==='correct'?'var(--green)':status==='wrong'?'var(--red)':'var(--yellow)'
        }">
            <b>Q${i+1}:</b> ${q.q}<br>
            <span style="color:var(--green)">✓ Correct: ${String.fromCharCode(65+q.ans)}. ${q.opt[q.ans]}</span><br>
            ${userAns!==-1?`<span style="color:${status==='correct'?'var(--green)':'var(--red)'}">Your: ${String.fromCharCode(65+userAns)}. ${q.opt[userAns]}</span>`:'<span style="color:var(--yellow)">Skipped</span>'}
            ${q.exp?`<div class="explain">💡 ${q.exp}</div>`:''}
        </div>`;
    });
    html+='</div>';
    document.getElementById('reviewBox').innerHTML=html;
    document.getElementById('reviewBox').classList.remove('hidden');
}
// === QUESTION BANK END ===
</script>
</body>
</html>
