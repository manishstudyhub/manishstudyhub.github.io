<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>300 Reasoning - Manish Study Hub</title>
<style>
body{font-family:sans-serif;background:#0f172a;color:#fff;padding:10px;margin:0}
.container{max-width:600px;margin:auto}
.card{background:#1e293b;padding:20px;border-radius:10px;margin:15px 0}
.btn{background:#22d3ee;color:#000;border:none;padding:15px;border-radius:8px;font-size:16px;font-weight:bold;width:100%;margin:8px 0;cursor:pointer}
.btn:hover{background:#06b6d4}
.option{background:#334155;padding:12px;border-radius:6px;margin:8px 0;cursor:pointer}
.option.correct{background:#16a34a}
.option.wrong{background:#dc2626}
.hide{display:none}
.q-title{color:#22d3ee;font-size:20px;margin-bottom:15px}
.nav{display:flex;gap:10px;margin-top:15px}
.nav button{flex:1}
#timer{background:#dc2626;padding:8px;border-radius:6px;font-weight:bold;text-align:center;margin-bottom:10px}
</style>
</head>
<body>
<div class="container">
  <div id="home" class="card">
    <h1 style="text-align:center;color:#22d3ee">🧠 300 Reasoning</h1>
    <p style="text-align:center">Manish Study Hub</p>
    <button class="btn" onclick="start(0)">📚 Practice Mode</button>
    <button class="btn" onclick="start(1)">⏱️ Exam Mode - 90 Min</button>
  </div>

  <div id="quiz" class="card hide">
    <div id="timer" class="hide"></div>
    <div class="q-title" id="qno"></div>
    <div id="ques" style="font-size:18px;margin-bottom:15px"></div>
    <div id="opts"></div>
    <div id="exp" class="hide" style="background:#0f172a;padding:10px;border-radius:6px;margin-top:10px;border-left:3px solid #22d3ee"></div>
    <div class="nav">
      <button class="btn" onclick="prev()">⬅️ Prev</button>
      <button class="btn" onclick="next()">Next ➡️</button>
    </div>
    <button class="btn" style="background:#dc2626;margin-top:10px" onclick="home()">🏠 Home</button>
  </div>
</div>

<script>
let q=[
{q:"2, 4, 8, 16,?",o:["24","30","32","36"],a:2,e:"16×2=32"},
{q:"A, C, F, J,?",o:["N","O","P","Q"],a:1,e:"+2,+3,+4,+5: J+5=O"},
{q:"दिल्ली : भारत :: पेरिस :?",o:["इंग्लैंड","फ्रांस","जर्मनी","इटली"],a:1,e:"दिल्ली भारत की, पेरिस फ्रांस की राजधानी"},
{q:"5, 10, 20, 40,?",o:["60","70","80","90"],a:2,e:"40×2=80"},
{q:"किताब : लेखक :: गाना :?",o:["गायक","संगीतकार","गीतकार","निर्देशक"],a:2,e:"किताब लेखक लिखता, गाना गीतकार लिखता"},
{q:"3, 6, 12, 24,?",o:["36","42","48","52"],a:2,e:"24×2=48"},
{q:"Z, X, V, T,?",o:["P","Q","R","S"],a:2,e:"-2 क्रम: T-2=R"},
{q:"पानी : प्यास :: खाना :?",o:["भूख","स्वाद","रसोई","पेट"],a:0,e:"पानी से प्यास, खाने से भूख मिटती"},
{q:"7, 14, 28, 56,?",o:["98","104","112","120"],a:2,e:"56×2=112"},
{q:"डॉक्टर : अस्पताल :: शिक्षक :?",o:["छात्र","किताब","विद्यालय","कक्षा"],a:2,e:"डॉक्टर अस्पताल में, शिक्षक विद्यालय में"},
// Bhai yaha 290 Q aur add kar dena. Format yahi hai: {q:"Sawal?",o:["A","B","C","D"],a:2,e:"Explain"}
// Main abhi 10 Q diye hain demo ke liye. Baaki 290 tu khud add kar le ya bol to main poora 300 ka file link de dunga
];
let ci=0,mode=0,time=5400,timer=null,score=0;

function start(m){
  mode=m;ci=0;score=0;
  document.getElementById('home').classList.add('hide');
  document.getElementById('quiz').classList.remove('hide');
  if(mode==1){
    document.getElementById('timer').classList.remove('hide');
    time=5400;
    timer=setInterval(()=>{
      time--;
      let m=Math.floor(time/60),s=time%60;
      document.getElementById('timer').innerText=`Time: ${m}:${s<10?'0'+s:s}`;
      if(time<=0){end()}
    },1000);
  }
  show();
}

function show(){
  let qu=q[ci];
  document.getElementById('qno').innerText=`Q${ci+1}/${q.length}`;
  document.getElementById('ques').innerText=qu.q;
  document.getElementById('exp').classList.add('hide');
  let opt=document.getElementById('opts');
  opt.innerHTML='';
  qu.o.forEach((txt,i)=>{
    let d=document.createElement('div');
    d.className='option';
    d.innerText=txt;
    d.onclick=()=>check(i);
    opt.appendChild(d);
  });
}

function check(i){
  let qu=q[ci],opts=document.querySelectorAll('.option');
  opts.forEach((o,idx)=>{
    o.onclick=null;
    if(idx==qu.a)o.classList.add('correct');
    else if(idx==i)o.classList.add('wrong');
  });
  if(i==qu.a)score++;
  if(mode==0){
    document.getElementById('exp').innerText='💡 '+qu.e;
    document.getElementById('exp').classList.remove('hide');
  }
}

function next(){
  if(ci<q.length-1){ci++;show()}
  else end();
}

function prev(){
  if(ci>0){ci--;show()}
}

function end(){
  clearInterval(timer);
  alert(`Test Khatam!\nScore: ${score}/${q.length}`);
  home();
}

function home(){
  clearInterval(timer);
  document.getElementById('quiz').classList.add('hide');
  document.getElementById('home').classList.remove('hide');
  document.getElementById('timer').classList.add('hide');
}
</script>
</body>
</html>
