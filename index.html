<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manish Study Hub - Test Portal</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#0f172a;color:#e2e8f0;padding:10px}
.container{max-width:800px;margin:0 auto}
.card{background:#1e293b;padding:20px;border-radius:12px;border:2px solid #334155;margin-bottom:15px}
.btn{background:#22d3ee;color:#0f172a;border:none;padding:14px;border-radius:8px;font-weight:700;font-size:16px;margin:6px 0;cursor:pointer;width:100%}
.btn:hover{background:#06b6d4}
.btn-sec{background:#334155;color:#e2e8f0}
.hide{display:none}
.header{text-align:center;margin-bottom:20px}
.header h1{color:#22d3ee;font-size:28px}
.sub-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;flex-wrap:wrap;gap:10px}
.badge{padding:8px 12px;border-radius:8px;font-weight:700}
#timer{background:#dc2626;color:#fff}
#score{background:#059669;color:#fff}
.q-title{font-size:18px;color:#22d3ee;margin-bottom:15px;font-weight:700}
.question{font-size:18px;line-height:1.6;margin-bottom:20px}
.option{background:#0f172a;padding:15px;border-radius:8px;margin:10px 0;border:2px solid #334155;cursor:pointer}
.option:hover{border-color:#22d3ee}
.option.correct{background:#065f46;border-color:#10b981}
.option.wrong{background:#7f1d1d;border-color:#ef4444}
.option.marked{border-color:#f59e0b}
#explain{display:none;background:#0f172a;padding:15px;border-radius:8px;margin-top:15px;border-left:4px solid #22d3ee}
.nav-btns{display:flex;gap:10px;margin-top:15px}
.nav-btns button{flex:1}
.palette{display:grid;grid-template-columns:repeat(10,1fr);gap:5px;margin:15px 0;max-height:220px;overflow-y:auto;padding:5px}
.q-num{aspect-ratio:1;border-radius:6px;border:2px solid #334155;background:#0f172a;color:#94a3b8;font-size:14px;cursor:pointer}
.q-num.current{border-color:#22d3ee;background:#22d3ee;color:#0f172a;font-weight:700}
.q-num.attempted{background:#065f46;border-color:#10b981;color:#fff}
.q-num.review{background:#f59e0b;border-color:#f59e0b;color:#0f172a}
#result{text-align:center}
#finalScore{font-size:36px;color:#22d3ee;margin:20px 0;font-weight:700}
.review-box{background:#0f172a;padding:15px;border-radius:8px;margin:10px 0;text-align:left}
@media(max-width:600px){.sub-grid{grid-template-columns:1fr}.palette{grid-template-columns:repeat(6,1fr)}}
</style>
</head>
<body>
<div class="container">
  <!-- HOME: 7 SUBJECTS -->
  <div id="home">
    <div class="header card">
      <h1>🧠 Manish Study Hub</h1>
      <p>Test Portal - No Login Needed</p>
    </div>
    <div class="card">
      <h3 style="margin-bottom:15px;text-align:center">Select Subject:</h3>
      <div class="sub-grid" id="subList"></div>
    </div>
  </div>

  <!-- MODE SELECT -->
  <div id="modeSelect" class="card hide">
    <h2 id="subName" style="color:#22d3ee;text-align:center;margin-bottom:20px"></h2>
    <button class="btn" onclick="startQuiz(0)">📚 Practice Mode<br><small style="font-weight:400">Bina Timer + Turant Explanation</small></button>
    <button class="btn btn-sec" onclick="startQuiz(1)">⏱️ Exam Mode - 60 Min<br><small style="font-weight:400">Final Result Ke Saath</small></button>
    <button class="btn btn-sec" onclick="backHome()">⬅️ Back</button>
  </div>

  <!-- QUIZ -->
  <div id="quiz" class="hide">
    <div class="top-bar">
      <div class="badge" id="score">Score: 0</div>
      <div class="badge hide" id="timer">Time: 60:00</div>
    </div>
    <div class="card">
      <div class="q-title" id="qNum"></div>
      <div class="question" id="question"></div>
      <div id="options"></div>
      <div id="explain"></div>
      <div class="nav-btns">
        <button class="btn btn-sec" onclick="prevQ()">⬅️ Prev</button>
        <button class="btn btn-sec" onclick="markReview()">⭐ Mark Review</button>
        <button class="btn" onclick="nextQ()">Next ➡️</button>
      </div>
      <button class="btn" style="background:#dc2626;margin-top:10px" onclick="submitTest()">Submit Test</button>
    </div>
    <div class="card">
      <div style="font-weight:700;margin-bottom:10px">Question Palette:</div>
      <div class="palette" id="palette"></div>
    </div>
  </div>

  <!-- RESULT -->
  <div id="result" class="card hide">
    <h2 style="color:#22d3ee">🎉 Test Complete!</h2>
    <div id="finalScore"></div>
    <div id="resultDetail"></div>
    <button class="btn" onclick="showReview()">📋 Review Answers</button>
    <button class="btn btn-sec" onclick="backHome()">🏠 Home</button>
  </div>

  <!-- REVIEW -->
  <div id="reviewPage" class="card hide">
    <h2 style="color:#22d3ee;text-align:center;margin-bottom:20px">Answer Review</h2>
    <div id="reviewList"></div>
    <button class="btn btn-sec" onclick="backToResult()">⬅️ Back to Result</button>
  </div>
</div>

<script>
// ===== DATA: 7 SUBJECTS =====
const subjects = {
  "Reasoning": [
    {q:"2, 4, 8, 16,?",o:["24","30","32","36"],a:2,e:"16×2=32"},
    {q:"A, C, F, J,?",o:["N","O","P","Q"],a:1,e:"+2,+3,+4,+5: J+5=O"},
    {q:"दिल्ली : भारत :: पेरिस :?",o:["इंग्लैंड","फ्रांस","जर्मनी","इटली"],a:1,e:"दिल्ली भारत की, पेरिस फ्रांस की राजधानी"},
    // Yaha 300 Q tak add kar dena. Abhi demo ke 3 Q hain
  ],
  "Maths": [
    {q:"12 × 8 =?",o:["86","96","106","76"],a:1,e:"12×8=96"},
    {q:"50 ka 20% kitna?",o:["5","10","15","20"],a:1,e:"50×20/100=10"},
  ],
  "GK": [
    {q:"Bharat ke Rashtrapati kaun hai?",o:["Narendra Modi","Droupadi Murmu","Amit Shah","Rahul Gandhi"],a:1,e:"Droupadi Murmu current President hain"},
  ],
  "Science": [
    {q:"Paani ka formula?",o:["H2O","CO2","O2","NaCl"],a:0,e:"H2O = 2 Hydrogen + 1 Oxygen"},
  ],
  "English": [
    {q:"Synonym of 'Happy'?",o:["Sad","Joyful","Angry","Tired"],a:1,e:"Joyful = Happy"},
  ],
  "Hindi": [
    {q:"'सूर्य' ka paryayvachi?",o:["चाँद","भास्कर","तारा","बादल"],a:1,e:"भास्कर सूर्य का पर्यायवाची है"},
  ],
  "Computer": [
    {q:"CPU ka full form?",o:["Central Processing Unit","Computer Personal Unit","Central Program Unit","Control Processing Unit"],a:0,e:"Central Processing Unit"},
  ]
};

// ===== LOGIC =====
let currentSub="",currentQ=0,mode=0,time=3600,timer=null,answers={},review=[];

// Init Subject Buttons
const subList=document.getElementById('subList');
Object.keys(subjects).forEach(sub=>{
  let b=document.createElement('button');
  b.className='btn';
  b.innerText=`${sub} - ${subjects[sub].length} Q`;
  b.onclick=()=>selectSub(sub);
  subList.appendChild(b);
});

function selectSub(sub){
  currentSub=sub;
  document.getElementById('home').classList.add('hide');
  document.getElementById('modeSelect').classList.remove('hide');
  document.getElementById('subName').innerText=sub;
}

function backHome(){
  clearInterval(timer);
  document.getElementById('modeSelect').classList.add('hide');
  document.getElementById('quiz').classList.add('hide');
  document.getElementById('result').classList.add('hide');
  document.getElementById('reviewPage').classList.add('hide');
  document.getElementById('home').classList.remove('hide');
}

function startQuiz(m){
  mode=m;currentQ=0;answers={};review=[];
  document.getElementById('modeSelect').classList.add('hide');
  document.getElementById('quiz').classList.remove('hide');

  if(mode==1){
    time=3600; // 60 min
    document.getElementById('timer').classList.remove('hide');
    timer=setInterval(()=>{
      time--;
      let mm=Math.floor(time/60),ss=time%60;
      document.getElementById('timer').innerText=`Time: ${mm}:${ss<10?'0'+ss:ss}`;
      if(time<=0)submitTest();
    },1000);
  } else {
    document.getElementById('timer').classList.add('hide');
  }

  buildPalette();
  loadQ();
}

function buildPalette(){
  const p=document.getElementById('palette');
  p.innerHTML='';
  subjects[currentSub].forEach((_,i)=>{
    let b=document.createElement('button');
    b.className='q-num';
    b.innerText=i+1;
    b.onclick=()=>{currentQ=i;loadQ()};
    b.id='q'+i;
    p.appendChild(b);
  });
}

function loadQ(){
  const q=subjects[currentSub][currentQ];
  document.getElementById('qNum').innerText=`Q${currentQ+1}/${subjects[currentSub].length}`;
  document.getElementById('question').innerText=q.q;
  document.getElementById('explain').classList.add('hide');

  // Update palette
  document.querySelectorAll('.q-num').forEach(el=>el.classList.remove('current'));
  document.getElementById('q'+currentQ).classList.add('current');
  if(review.includes(currentQ))document.getElementById('q'+currentQ).classList.add('review');

  // Options
  const optDiv=document.getElementById('options');
  optDiv.innerHTML='';
  q.o.forEach((txt,i)=>{
    let d=document.createElement('div');
    d.className='option';
    d.innerText=txt;
    if(answers[currentQ]!=undefined){
      d.onclick=null;
      if(i==q.a)d.classList.add('correct');
      else if(i==answers[currentQ])d.classList.add('wrong');
    } else {
      d.onclick=()=>selectAns(i);
    }
    optDiv.appendChild(d);
  });

  // Show explain in practice mode if answered
  if(mode==0 && answers[currentQ]!=undefined){
    document.getElementById('explain').innerText='💡 '+q.e;
    document.getElementById('explain').classList.remove('hide');
  }

  updateScore();
}

function selectAns(i){
  answers[currentQ]=i;
  document.getElementById('q'+currentQ).classList.add('attempted');
  loadQ();
}

function markReview(){
  if(!review.includes(currentQ)){
    review.push(currentQ);
    document.getElementById('q'+currentQ).classList.add('review');
  } else {
    review=review.filter(x=>x!=currentQ);
    document.getElementById('q'+currentQ).classList.remove('review');
  }
}

function nextQ(){
  if(currentQ<subjects[currentSub].length-1){currentQ++;loadQ()}
}

function prevQ(){
  if(currentQ>0){currentQ--;loadQ()}
}

function updateScore(){
  let sc=0;
  subjects[currentSub].forEach((q,i)=>{
    if(answers[i]==q.a)sc++;
  });
  document.getElementById('score').innerText=`Score: ${sc}/${subjects[currentSub].length}`;
}

function submitTest(){
  clearInterval(timer);
  let sc=0,attempt=Object.keys(answers).length;
  subjects[currentSub].forEach((q,i)=>{
    if(answers[i]==q.a)sc++;
  });

  document.getElementById('quiz').classList.add('hide');
  document.getElementById('result').classList.remove('hide');
  document.getElementById('finalScore').innerText=`${sc} / ${subjects[currentSub].length}`;
  document.getElementById('resultDetail').innerHTML=`
    <div class="review-box">✅ Correct: ${sc}</div>
    <div class="review-box">❌ Wrong: ${attempt-sc}</div>
    <div class="review-box">⚪ Skipped: ${subjects[currentSub].length-attempt}</div>
    <div class="review-box">📊 Accuracy: ${attempt?Math.round(sc/attempt*100):0}%</div>
  `;
}

function showReview(){
  document.getElementById('result').classList.add('hide');
  document.getElementById('reviewPage').classList.remove('hide');
  const list=document.getElementById('reviewList');
  list.innerHTML='';
  subjects[currentSub].forEach((q,i)=>{
    let userAns=answers[i]!=undefined?q.o[answers[i]]:'Not Attempted';
    let status=answers[i]==q.a?'✅ Correct':answers[i]!=undefined?'❌ Wrong':'⚪ Skipped';
    list.innerHTML+=`
      <div class="review-box">
        <b>Q${i+1}: ${q.q}</b><br>
        Your Ans: ${userAns} ${status}<br>
        Correct: ${q.o[q.a]}<br>
        💡 ${q.e}
      </div>
    `;
  });
}

function backToResult(){
  document.getElementById('reviewPage').classList.add('hide');
  document.getElementById('result').classList.remove('hide');
}
</script>
</body>
</html>
