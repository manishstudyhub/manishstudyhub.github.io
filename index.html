<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Reasoning 200 Q - Final</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#1a1a1a;color:#fff;padding:10px}
.container{max-width:900px;margin:0 auto;background:#2d2d2d;padding:15px;border-radius:10px}
h1{color:#4dabf7;text-align:center;margin-bottom:15px}
.mode-btn{background:#1a73e8;color:white;padding:12px 20px;border:none;border-radius:8px;margin:5px;cursor:pointer;width:45%}
.exam-btn{background:#dc3545}
.timer{font-size:20px;font-weight:bold;color:#ff6b6b;text-align:center;margin:10px 0;display:none}
.question-box{margin:15px 0;padding:15px;border:2px solid #444;border-radius:8px;background:#333}
.option{display:block;margin:8px 0;padding:12px;background:#3a3a3a;border:2px solid #555;border-radius:5px;cursor:pointer}
.correct{background:#2d5a2d!important}
.wrong{background:#5a2d2d!important}
.explain{margin-top:15px;padding:12px;background:#4a4a2d;border-left:4px solid #ffc107;display:none}
.nav-btn{background:#28a745;color:white;padding:10px 15px;border:none;border-radius:5px;margin:3px;cursor:pointer}
#score{text-align:center;margin:10px 0;font-weight:bold}
.palette{display:grid;grid-template-columns:repeat(10,1fr);gap:5px;margin:15px 0}
.q-num{padding:8px;background:#3a3a3a;border:1px solid #555;border-radius:4px;cursor:pointer;text-align:center;font-size:12px}
.q-attempted{background:#2d5a2d}
.q-current{border:2px solid #1a73e8}
.result-box{text-align:center;padding:20px;background:#333;border-radius:8px;display:none}
@media(max-width:600px){.mode-btn{width:100%}.palette{grid-template-columns:repeat(5,1fr)}}
</style>
</head>
<body>
<div class="container">
<h1>🎯 Reasoning Practice - 200 Q</h1>
<div id="home">
<div style="text-align:center">
<button class="mode-btn exam-btn" onclick="startQuiz('exam')">📝 Exam Mode - 60 Min</button>
<button class="mode-btn" onclick="startQuiz('practice')">📚 Practice Mode</button>
</div>
</div>
<div id="quiz" style="display:none">
<div class="timer" id="timer">Time: 60:00</div>
<div id="score">Score: 0/200</div>
<div class="palette" id="palette"></div>
<div class="question-box">
<h3 id="qNum">Question 1/200</h3>
<p id="question"></p>
<div id="options"></div>
<div class="explain" id="explain"></div>
</div>
<div style="text-align:center">
<button class="nav-btn" onclick="prevQ()">⬅️ Prev</button>
<button class="nav-btn" onclick="nextQ()">Next ➡️</button>
<button class="nav-btn" onclick="submitTest()" style="background:#dc3545">Submit</button>
</div>
</div>
<div class="result-box" id="result">
<h2>🎉 Test Complete!</h2>
<p id="finalScore" style="font-size:24px;margin:15px 0"></p>
<button class="nav-btn" onclick="location.reload()">🏠 Home</button>
</div>
</div>
