<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test</title>
<style>
body{background:#1a1a1a;color:#fff;font-family:Arial;padding:10px}
.container{max-width:600px;margin:0 auto;background:#2d2d2d;padding:15px;border-radius:10px}
.btn{background:#1a73e8;color:#fff;padding:12px 20px;border:none;border-radius:8px;margin:5px;cursor:pointer;width:45%}
.option{display:block;margin:8px 0;padding:12px;background:#3a3a3a;border:2px solid #555;border-radius:5px;cursor:pointer}
.correct{background:#2d5a2d!important}
.wrong{background:#5a2d2d!important}
</style>
</head>
<body>
<div class="container">
    <h1 style="color:#4dabf7;text-align:center">🎯 MCQ Test</h1>
    <div id="home">
        <div style="text-align:center">
            <button class="btn" onclick="start()">📚 Start Test</button>
        </div>
    </div>
    <div id="quiz" style="display:none">
        <h3 id="qNum">Q1/5</h3>
        <p id="question"></p>
        <div id="options"></div>
        <div style="text-align:center;margin-top:15px">
            <button class="btn" onclick="nextQ()">Next</button>
        </div>
    </div>
</div>
<script>
const questions = [
{q:"2+2=?",options:["3","4","5","6"],ans:1},
{q:"5×5=?",options:["20","25","30","35"],ans:1},
{q:"आँख : देखना :: कान :?",options:["सुनना","बोलना","छूना","सूंघना"],ans:0},
{q:"10, 20, 30,?",options:["35","40","45","50"],ans:1},
{q:"A, B, C,?",options:["D","E","F","G"],ans:0}
];
let currentQ = 0;
let score = 0;
function start(){
    document.getElementById('home').style.display='none';
    document.getElementById('quiz').style.display='block';
    showQuestion();
}
function showQuestion(){
    const q = questions[currentQ];
    document.getElementById('qNum').textContent = `Q${currentQ + 1}/5`;
    document.getElementById('question').textContent = q.q;
    const optionsDiv = document.getElementById('options');
    optionsDiv.innerHTML = '';
    q.options.forEach((opt,i)=>{
        const btn = document.createElement('div');
        btn.className = 'option';
        btn.textContent = opt;
        btn.onclick = ()=>check(i);
        optionsDiv.appendChild(btn);
    });
}
function check(i){
    const q = questions[currentQ];
    const opts = document.querySelectorAll('.option');
    opts.forEach((opt,idx)=>{
        if(idx === q.ans) opt.classList.add('correct');
        else if(idx === i) opt.classList.add('wrong');
        opt.onclick = null;
    });
    if(i === q.ans) score++;
}
function nextQ(){
    currentQ++;
    if(currentQ < questions.length){
        showQuestion();
    }else{
        alert(`Test Complete! Score: ${score}/5`);
        location.reload();
    }
}
</script>
</body>
</html>
