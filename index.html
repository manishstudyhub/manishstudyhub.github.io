, 15, 24, 35,?",options:["46","48","50","52"],ans:1,explain:"2²-1,3²-1,4²-1...अगला 7²-1=48"},{q:"पैर : जूता :: सिर :?",options:["बाल","टोपी","मस्तिष्क","चेहरा"],ans:1,explain:"पैर में जूता, सिर पर टोपी"},{q:"5, 11, 23, 47,?",options:["89","91","93","95"],ans:3,explain:"×2+1: 47×2+1=95"},{q:"A, E, I, M, Q,?",options:["S","T","U","V"],ans:2,explain:"+4 क्रम: Q+4=U"},{q:"कलम : स्याही :: कार :?",options:["पहिया","पेट्रोल","चालक","सड़क"],ans:1,explain:"कलम स्याही से, कार पेट्रोल से"},{q:"2, 3, 5, 8, 13,?",options:["18","20","21","23"],ans:2,explain:"फिबोनाची: 8+13=21"},{q:"हिमालय : पर्वत :: गंगा :?",options:["जल","नदी","भारत","हिमालय"],ans:1,explain:"हिमालय पर्वत है, गंगा नदी है"},{q:"4, 12, 36, 108,?",options:["216","324","432","512"],ans:1,explain:"हर बार ×3: 108×3=324"},{q:"D, H, L, P, T,?",options:["W","X","Y","Z"],ans:1,explain:"+4 क्रम: T+4=X"},{q:"कुर्सी : फर्नीचर :: सेब :?",options:["पेड़","फल","लाल","मीठा"],ans:1,explain:"कुर्सी फर्नीचर का प्रकार, सेब फल का प्रकार"},{q:"10, 20, 40, 80,?",options:["120","140","160","180"],ans:2,explain:"हर बार ×2: 80×2=160"},{q:"ACE, GIK, MOQ,?",options:["STV","SUW","STU","TVX"],ans:1,explain:"हर अक्षर +6: M+6=S,O+6=U,Q+6=W"},{q:"बर्फ : ठंडा :: आग :?",options:["लाल","गर्म","जलना","धुआं"],ans:1,explain:"बर्फ ठंडी, आग गर्म"},{q:"1, 2, 6, 24, 120,?",options:["480","600","720","840"],ans:2,explain:"1!,2!,3!,4!,5!,अगला 6!=720"},{q:"शेर : मांस :: गाय :?",options:["दूध","घास","जंगल","सींग"],ans:1,explain:"शेर मांस खाता है, गाय घास"},{q:"9, 16, 25, 36, 49,?",options:["56","64","72","81"],ans:1,explain:"3²,4²,5²,6²,7²,अगला 8²=64"},{q:"BDF, HJL, NPR,?",options:["TVX","SUW","TUV","XYZ"],ans:0,explain:"हर अक्षर +6: N+6=T,P+6=V,R+6=X"},{q:"नाक : सूंघना :: जीभ :?",options:["बोलना","खाना","स्वाद","चखना"],ans:3,explain:"नाक सूंघने के लिए, जीभ चखने के लिए"},{q:"6, 13, 27, 55,?",options:["109","111","113","115"],ans:1,explain:"×2+1: 55×2+1=111"},{q:"AZ, BY, CX, DW,?",options:["EV","FU","GT","HS"],ans:0,explain:"पहला+1,दूसरा-1: D+1=E,W-1=V"},{q:"रे ,ans:1,explain:"D=B की माता=A की माता"},{q:"यदि CAT=6, DOG=9, तो ELEPHANT=?",options:["21","24","27","30"],ans:0,explain:"अक्षरों की संख्या×2: CAT=3×2=6, ELEPHANT=7×2=21"},{q:"4, 16, 64, 256,?",options:["512","1024","2048","4096"],ans:1,explain:"4¹=4,4²=16,4³=64,4⁴=256,4⁵=1024"},{q:"सभी पेड़ पौधे हैं। कुछ पौधे फूल हैं। निष्कर्ष?",options:["सभी पेड़ फूल हैं","कुछ पेड़ फूल हैं","निष्कर्ष नहीं","कोई नहीं"],ans:2,explain:"कुछ पौधे फूल हैं, पर जरूरी नहीं वो पेड़ हों"},{q:"यदि आज शनिवार है, तो 365 दिन बाद कौन-सा दिन?",options:["शुक्रवार","शनिवार","रविवार","सोमवार"],ans:1,explain:"365÷7=52 सप्ताह 1 दिन. शनिवार+1=रविवार"},{q:"2, 10, 30, 68, 130,?",options:["210","222","240","250"],ans:1,explain:"n³+n: 6³+6=222"},{q:"पत्नी की बहन के पति के भाई की पत्नी आपकी क्या लगेगी?",options:["साली","ननद","जेठानी","देवरानी"],ans:0,explain:"पत्नी की बहन=साली, उसका पति=साढू, उसका भाई=साढू, उसकी पत्नी=साली"},{q:"यदि MOBILE=60, PHONE=52, तो LAPTOP=?",options:["84","85","86","87"],ans:1,explain:"M=13+O=15+B=2+I=9+L=12+E=5=85"},{q:"7, 49, 343, 2401,?",options:["16007","16807","17007","17507"],ans:1,explain:"7¹=7,7²=49,7³=343,7⁴=2401,7⁵=16807"},{q:"एक कक्षा में 60 छात्र। 40 क्रिकेट, 30 फुटबॉल, 20 दोनों। केवल क्रिकेट?",options:["10","20","30","40"],ans:1,explain:"केवल क्रिकेट=40-20=20"},{q:"सभी बिल्ली जानवर हैं। कुछ जानवर कुत्ते हैं। निष्कर्ष?",options:["सभी बिल्ली कुत्ते हैं","कुछ बिल्ली कुत्ते हैं","निष्कर्ष नहीं","कोई नहीं"],ans:2,explain:"कुछ जानवर कुत्ते हैं, पर जरूरी नहीं वो बिल्ली हों"},{q:"3, 12, 39, 120, 363,?",options:["1080","1090","1092","1100"],ans:2,explain:"×3+3: 363×3+3=1092"},{q:"उत्तर की ओर 50m, फिर पूर्व 30m, फिर दक्षिण 20m। प्रारंभ से दूरी?",options:["30√2 m","40m","50m","60m"],ans:1,explain:"उत्तर-दक्षिण=50-20=30m, पूर्व=30m. √(30²+30²)=30√2≈42.4. Nearest=40m"}];
let currentQ=0,score=0,mode='',answers=[],timer;function startQuiz(m){mode=m;document.getElementById('home').style.display='none';document.getElementById('quiz').style.display='block';if(m=='exam'){document.getElementById('timer').style.display='block';startTimer()}loadPalette();loadQ(0)}function startTimer(){let t=3600;timer=setInterval(()=>{t--;let m=Math.floor(t/60),s=t%60;document.getElementById('timer').innerText=`Time: ${m}:${s<10?'0':''}${s}`;if(t<=0)submitTest()},1000)}function loadPalette(){let p=document.getElementById('palette');p.innerHTML='';for(let i=0;i<200;i++){let b=document.createElement('button');b.className='q-num';b.innerText=i+1;b.onclick=()=>loadQ(i);p.appendChild(b)}}function loadQ(i){currentQ=i;let q=questions[i];document.getElementById('qNum').innerText=`Question ${i+1}/200`;document.getElementById('question').innerText=q.q;let o=document.getElementById('options');o.innerHTML='';q.options.forEach((opt,j)=>{let d=document.createElement('div');d.className='option';d.innerText=opt;d.onclick=()=>check(j);if(answers[i]!=undefined){if(j==q.ans)d.classList.add('correct');if(j==answers[i]&&j!=q.ans)d.classList.add('wrong')}o.appendChild(d)});document.getElementById('explain').style.display=answers[i]!=undefined&&mode=='practice'?'block':'none';if(answers[i]!=undefined)document.getElementById('explain').innerText='💡 '+q.explain;updatePalette();document.getElementById('score').innerText=`Score: ${score}/200`}function check(j){if(answers[currentQ]!=undefined)return;answers[currentQ]=j;if(j==questions[currentQ].ans)score++;let opts=document.querySelectorAll('.option');opts.forEach((o,k)=>{if(k==questions[currentQ].ans)o.classList.add('correct');if(k==j&&k!=questions[currentQ].ans)o.classList.add('wrong')});if(mode=='practice'){document.getElementById('explain').style.display='block';document.getElementById('explain').innerText='💡 '+questions[currentQ].explain}updatePalette();document.getElementById('score').innerText=`Score: ${score}/200`}function updatePalette(){document.querySelectorAll('.q-num').forEach((b,i)=>{b.className='q-num';if(answers[i]!=undefined)b.classList.add('q-attempted');if(i==currentQ)b.classList.add('q-current')})}function nextQ(){if(currentQ<199)loadQ(currentQ+1)}function prevQ(){if(currentQ>0)loadQ(currentQ-1)}function submitTest(){clearInterval(timer);document.getElementById('quiz').style.display='none';document.getElementById('result').style.display='block';document.getElementById('finalScore').innerText=`Your Score: ${score}/200`}</script>
